services:
  postgres:
    image: postgres:16-alpine
    container_name: lm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-license_mgmt}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:8-alpine
    container_name: lm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build:
      context: ./backend/LicenseManagement
      dockerfile: src/LicenseManagement.Api/Dockerfile
    container_name: lm-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME:-license_mgmt};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}"
      Jwt__Secret: ${JWT_SECRET:-ThisIsADevelopmentSecretKeyThatMustBeAtLeast32Characters}
      Jwt__Issuer: LicenseManagement
      Jwt__Audience: LicenseManagement
      Security__MasterEncryptionKey: ${MASTER_KEY:-DevMasterKeyForLicenseEncryption2024}
      Cors__Origins__0: http://localhost:3000
    ports:
      - "5000:5000"
    networks:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    networks:
      - frontend

  nginx:
    image: nginx:alpine
    container_name: lm-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:

networks:
  backend:
  frontend:
