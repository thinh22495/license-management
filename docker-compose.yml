services:
  postgres:
    image: postgres:18-alpine
    container_name: lm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-license_mgmt}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:8-alpine
    container_name: lm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: lm-backend
    restart: unless-stopped
    working_dir: /src
    command: dotnet watch run --project src/LicenseManagement.Api/LicenseManagement.Api.csproj --no-launch-profile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:5000
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME:-license_mgmt};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}"
      Jwt__Secret: ${JWT_SECRET:-ThisIsADevelopmentSecretKeyThatMustBeAtLeast32Characters}
      Jwt__Issuer: LicenseManagement
      Jwt__Audience: LicenseManagement
      Security__MasterEncryptionKey: ${MASTER_KEY:-DevMasterKeyForLicenseEncryption2024}
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redis123},abortConnect=false"
      Cors__Origins__0: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/LicenseManagement:/src
    networks:
      - backend
      - frontend

  frontend:
    image: node:20-alpine
    container_name: lm-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - frontend

  nginx:
    image: nginx:alpine
    container_name: lm-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
  frontend_node_modules:

networks:
  backend:
  frontend:
