services:
  postgres:
    image: postgres:18-alpine
    container_name: lm-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  redis:
    image: redis:8-alpine
    container_name: lm-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  backend:
    build:
      context: ./backend/LicenseManagement
      dockerfile: src/LicenseManagement.Api/Dockerfile
    container_name: lm-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-LicenseManagement}
      Jwt__Audience: ${JWT_AUDIENCE:-LicenseManagement}
      Security__MasterEncryptionKey: ${MASTER_KEY}
      Cors__Origins__0: ${FRONTEND_URL:-https://yourdomain.com}
      App__BaseUrl: ${APP_BASE_URL:-https://yourdomain.com/api/v1}
      App__FrontendUrl: ${FRONTEND_URL:-https://yourdomain.com}
      Email__Smtp__Host: ${SMTP_HOST}
      Email__Smtp__Port: ${SMTP_PORT:-587}
      Email__Smtp__Username: ${SMTP_USERNAME}
      Email__Smtp__Password: ${SMTP_PASSWORD}
      Email__Smtp__FromEmail: ${SMTP_FROM_EMAIL}
      Email__Smtp__FromName: ${SMTP_FROM_NAME:-License Management}
      Payment__MoMo__PartnerCode: ${MOMO_PARTNER_CODE}
      Payment__MoMo__AccessKey: ${MOMO_ACCESS_KEY}
      Payment__MoMo__SecretKey: ${MOMO_SECRET_KEY}
      Payment__VnPay__TmnCode: ${VNPAY_TMN_CODE}
      Payment__VnPay__HashSecret: ${VNPAY_HASH_SECRET}
      Payment__ZaloPay__AppId: ${ZALOPAY_APP_ID}
      Payment__ZaloPay__Key1: ${ZALOPAY_KEY1}
      Payment__ZaloPay__Key2: ${ZALOPAY_KEY2}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${APP_BASE_URL:-https://yourdomain.com/api/v1}
    container_name: lm-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${APP_BASE_URL:-https://yourdomain.com/api/v1}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - frontend

  nginx:
    image: nginx:alpine
    container_name: lm-nginx
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - frontend
      - backend

  db-backup:
    image: postgres:16-alpine
    container_name: lm-db-backup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGDATABASE: ${DB_NAME}
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
      - ./scripts/setup-cron.sh:/setup-cron.sh:ro
    entrypoint: ["/bin/sh", "/setup-cron.sh"]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - backend

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
